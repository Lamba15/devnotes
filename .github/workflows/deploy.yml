name: Deploy Devnotes to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, bcmath, gd, xml, fileinfo
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies (for artisan during build)
        run: composer install --prefer-dist --no-interaction

      - name: Prepare build environment
        run: cp .env.example .env

      - name: Install Node.js dependencies
        run: npm ci

      - name: Generate Wayfinder files
        run: php artisan wayfinder:generate --with-form

      - name: Build assets
        run: npm run build

      - name: Sync files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/public/hot
            **/.env
            **/.env.*
            **/tests/**
            **/storage/app/public/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/testing/**
            **/storage/framework/views/**
            **/storage/logs/**

      - name: Install dependencies and cache on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd ~/domains/devnotes.nouraboelsoud.com
            export PATH="/opt/alt/php83/usr/bin:$PATH"
            php -v
            rm -rf vendor
            php /usr/local/bin/composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan storage:link || true
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
